name: Stock Agent

on:
  schedule:
    - cron: "17 0,6,12,18 * * *"
      timezone: "Asia/Jerusalem"
  workflow_dispatch:

concurrency:
  group: stock-agent-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore last valid agent state
        uses: actions/cache/restore@v4
        with:
          path: data/agent-state.json
          key: stock-agent-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            stock-agent-state-

      - name: Install agent
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run live agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
        run: investment-agent run-all

      - name: Save updated valid state
        if: success()
        uses: actions/cache/save@v4
        with:
          path: data/agent-state.json
          key: stock-agent-state-${{ github.run_id }}-${{ github.run_attempt }}
